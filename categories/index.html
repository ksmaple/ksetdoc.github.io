    </div><script>
    (function() {
        const container = document.getElementById('starlink-container');
        const starsBg = document.getElementById('stars-background');
        const nodes = document.querySelectorAll('.starlink-node');
        const lines = document.querySelectorAll('.starlink-line');

        
        function generateStars() {
            const starCount = 100;
            let starsHTML = '';
            for (let i = 0; i < starCount; i++) {
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const size = Math.random() * 2 + 1;
                const delay = Math.random() * 3;
                const duration = Math.random() * 2 + 2;
                starsHTML += `<div class="star" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;animation-delay:${delay}s;animation-duration:${duration}s"></div>`;
            }
            starsBg.innerHTML = starsHTML;
        }

        
        function positionNodes() {
            const containerRect = container.getBoundingClientRect();
            const centerX = containerRect.width / 2;
            const centerY = containerRect.height / 2;
            const radius = Math.min(centerX, centerY) * 0.7;

            nodes.forEach((node, index) => {
                const angle = (index / nodes.length) * Math.PI * 2 - Math.PI / 2;
                
                const randomOffset = (Math.random() - 0.5) * 100;
                const x = centerX + Math.cos(angle) * radius + randomOffset;
                const y = centerY + Math.sin(angle) * radius * 0.6 + randomOffset * 0.5;

                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
            });

            updateLines();
        }

        
        function updateLines() {
            lines.forEach(line => {
                const fromTerm = line.dataset.from;
                const toTerm = line.dataset.to;
                const fromNode = document.querySelector(`.starlink-node[data-term="${fromTerm}"]`);
                const toNode = document.querySelector(`.starlink-node[data-term="${toTerm}"]`);

                if (fromNode && toNode) {
                    const fromRect = fromNode.getBoundingClientRect();
                    const toRect = toNode.getBoundingClientRect();
                    const containerRect = container.getBoundingClientRect();

                    const x1 = fromRect.left + fromRect.width / 2 - containerRect.left;
                    const y1 = fromRect.top + fromRect.height / 2 - containerRect.top;
                    const x2 = toRect.left + toRect.width / 2 - containerRect.left;
                    const y2 = toRect.top + toRect.height / 2 - containerRect.top;

                    line.setAttribute('x1', x1);
                    line.setAttribute('y1', y1);
                    line.setAttribute('x2', x2);
                    line.setAttribute('y2', y2);
                }
            });
        }

        
        nodes.forEach(node => {
            node.addEventListener('mouseenter', () => {
                const term = node.dataset.term;
                lines.forEach(line => {
                    if (line.dataset.from === term || line.dataset.to === term) {
                        line.classList.add('active');
                    } else {
                        line.classList.add('dimmed');
                    }
                });
                nodes.forEach(n => {
                    if (n !== node) {
                        n.classList.add('dimmed');
                    }
                });
            });

            node.addEventListener('mouseleave', () => {
                lines.forEach(line => {
                    line.classList.remove('active', 'dimmed');
                });
                nodes.forEach(n => {
                    n.classList.remove('dimmed');
                });
            });
        });

        
        generateStars();
        
        setTimeout(positionNodes, 100);

        
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(positionNodes, 250);
        });

        
        setInterval(() => {
            const randomLine = lines[Math.floor(Math.random() * lines.length)];
            if (randomLine) {
                randomLine.classList.add('pulse');
                setTimeout(() => randomLine.classList.remove('pulse'), 2000);
            }
        }, 3000);
    })();
    </script></div>
